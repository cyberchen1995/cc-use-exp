interface:
  display_name: "project-scan"
  short_description: "扫描仓库并生成或刷新项目级 AGENTS.md / README.md。"
  default_prompt: "Use $project-scan to inspect this repository, summarize the detected stack and project conventions, initialize the minimal project-local .codex skeleton (.codex/tasks, .codex/tasks/archived, .codex/templates) if missing, and then create or update the repository-root AGENTS.md and README.md. Reuse the existing project-init AGENTS template for AGENTS.md. For README.md, create a minimal useful README when missing; when it exists, prefer AUTO block incremental updates and ask the user before appending AUTO blocks or doing a first-time full rebuild. Do not overwrite hand-written content silently."
policy:
  allow_implicit_invocation: false
