interface:
  display_name: "project-scan"
  short_description: "扫描仓库并生成或刷新 AGENTS.md / README.md / 全套脚手架（restart.sh、ignore、Dockerfile、docker-compose）。"
  default_prompt: "Use $project-scan to inspect this repository, summarize the detected stack and project conventions, initialize the minimal project-local .codex skeleton (.codex/tasks, .codex/tasks/archived, .codex/templates) if missing, then create or update the repository-root AGENTS.md and README.md, AND scaffold the full project file set: restart.sh, .claudeignore, .geminiignore, .gitignore, .dockerignore, Dockerfile, docker-compose.yml. Reuse cc-project-init/assets templates for scaffolding. The output must match Claude Code /project-scan: never produce fewer files. For existing files, ask the user whether to overwrite / skip / incrementally update (AUTO blocks). chmod +x restart.sh after writing. Do not overwrite hand-written content silently."
policy:
  allow_implicit_invocation: false
