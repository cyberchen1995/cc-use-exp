interface:
  display_name: "new-feature"
  short_description: "显式推进新功能：需求澄清、设计、实现、验证与恢复。"
  default_prompt: "Use $new-feature to first scan .codex/tasks and immediately move any task files already marked completed into .codex/tasks/archived. Then check for resumable tasks in .codex/tasks, ignoring .codex/tasks/archived, before asking the minimum clarifying questions for scope, edge cases, and dependencies. Move the active task file into .codex/tasks/archived after finishing."
policy:
  allow_implicit_invocation: false
