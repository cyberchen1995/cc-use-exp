interface:
  display_name: "cc-new-feature"
  short_description: "显式推进新功能：需求澄清、设计、实现、验证与恢复。"
  default_prompt: "Use $cc-new-feature to first ensure the project-local .codex/tasks and .codex/tasks/archived directories exist by actually attempting mkdir -p .codex/tasks/archived when needed. Do not treat a missing directory as equivalent to not writable. If creating the project-local .codex skeleton hits a workspace permission boundary, request the platform's approval prompt for the mkdir action instead of only reporting the directory as not writable. Then scan .codex/tasks and immediately move any task files already marked completed into .codex/tasks/archived. Check for resumable tasks in .codex/tasks, ignoring .codex/tasks/archived, and verify the current session can write the project-local .codex/tasks only after the directory exists. If the user only wants to record a not-started or interrupted feature, keep the task state as 需求中 or 待开始 instead of 进行中 and prefer handing off pure state-capture work to $cc-task-state. Once the feature actually enters implementation, explicitly switch the main task state to 进行中. Only if the project directory is truly not writable even after the approval path should you explicitly report the persistence constraint and fall back to ~/.codex/tasks. Ask the minimum clarifying questions for scope, edge cases, and dependencies once implementation is actually about to start, keep the active task file updated during implementation, and move it into the matching archived directory after finishing."
policy:
  allow_implicit_invocation: false
