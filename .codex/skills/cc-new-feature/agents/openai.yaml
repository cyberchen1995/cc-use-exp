interface:
  display_name: "cc-new-feature"
  short_description: "显式推进新功能：需求澄清、设计、实现、验证与恢复。"
  default_prompt: "使用 $cc-new-feature 时，先实际执行 mkdir -p .codex/tasks/archived 确保项目级 .codex/tasks 与 .codex/tasks/archived 目录存在。不要把目录缺失等同于不可写。如果创建项目级 .codex 骨架时遇到工作区权限边界，应主动请求平台的批准提示来执行 mkdir，而不是只报告目录不可写。接着扫描 .codex/tasks，把已标记为已完成的任务文件立即移到 .codex/tasks/archived。检查 .codex/tasks 中是否有可恢复任务（忽略 .codex/tasks/archived），仅在目录存在后才验证当前会话能否写入项目级 .codex/tasks。如果用户只想记录尚未开始或被打断的功能，保持任务状态为「需求中」或「待开始」而不是「进行中」，并优先将纯状态记录工作交给 $cc-task-state。只有当功能真正进入实施阶段时，才显式将主任务状态切换为「进行中」。只有在走过批准路径后项目目录依然真的不可写，才显式说明持久化约束并回退到 ~/.codex/tasks。等到实施真正即将开始时，再就范围、边界条件和依赖提出最少必要的澄清问题；实施过程中保持活动任务文件同步更新，完成后把它移到对应的 archived 目录。"
policy:
  allow_implicit_invocation: false
