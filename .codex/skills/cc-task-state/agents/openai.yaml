interface:
  display_name: "cc-task-state"
  short_description: "沉淀任务状态、打断点和恢复入口，避免进展只留在对话里。"
  default_prompt: "使用 $cc-task-state 将用户用自然语言描述的进度更新转化为项目级 .codex/tasks 状态。先确认当前会话真的可以写入项目级 tasks 目录；如果项目级初始化遇到权限边界，主动请求平台的批准路径；只有在走过批准路径后项目目录依然不可写时，才描述回退方案。多个任务主题应拆成独立任务记录；尚未开始的工作保持「需求中」或「待开始」而不是「进行中」；在因修复打断而切换上下文之前，先添加中断断点；记录具体的恢复入口和下一步动作。"
policy:
  allow_implicit_invocation: false
