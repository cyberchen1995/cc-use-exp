interface:
  display_name: "cc-fix"
  short_description: "显式 bug 修复与结构化 debug 工作流。"
  default_prompt: "Use $cc-fix to confirm the expected behavior and current symptom before reading the relevant code and proposing a minimal fix. If this fix interrupts an existing in-progress task, record a checkpoint first so the main task has a resume entry and next step before you switch context."
policy:
  allow_implicit_invocation: false
