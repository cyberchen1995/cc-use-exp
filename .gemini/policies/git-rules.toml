# 针对内置 Shell 工具的放行
[[rule]]
toolName = "run_shell_command"
commandPrefix = "git diff"
decision = "allow"
priority = 200
description = "全局允许 run_shell_command 执行 git diff 系列命令"

# 针对其他 Git 只读命令的放行
[[rule]]
toolName = "run_shell_command"
commandPrefix = "git status"
decision = "allow"
priority = 200

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git log"
decision = "allow"
priority = 200

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git branch"
decision = "allow"
priority = 200

# 如果 commit_msg 是一个独立的注册工具，它不能使用 commandPrefix 进行前缀匹配。
# 直接放行该工具即可（去掉了非法的 commandPrefix 和连字符版本）：
[[rule]]
toolName = "commit_msg"
decision = "allow"
priority = 210
description = "明确允许 commit_msg 工具运行"

[[commands]]
name = "git"
action = "allow"
