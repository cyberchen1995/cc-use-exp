<svg width="1000" height="720" viewBox="0 0 1000 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gm-bg" x1="0" y1="0" x2="1000" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1235" />
      <stop offset="1" stop-color="#0A0418" />
    </linearGradient>
    <linearGradient id="gm-accent" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4285F4" />
      <stop offset="0.5" stop-color="#9B72CB" />
      <stop offset="1" stop-color="#E94B83" />
    </linearGradient>
    <radialGradient id="gm-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 360) rotate(0) scale(420 200)">
      <stop offset="0" stop-color="#9B72CB" stop-opacity="0.18" />
      <stop offset="1" stop-color="#9B72CB" stop-opacity="0" />
    </radialGradient>
    <filter id="gm-shadow" x="-20" y="-20" width="1040" height="760">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.3" />
    </filter>
    <style>
      .gm-title { font: bold 26px "Trebuchet MS", sans-serif; fill: #C7B6F0; }
      .gm-sub { font: 13px "Trebuchet MS", sans-serif; fill: #9B95B8; }
      .gm-h { font: bold 14px "Trebuchet MS", sans-serif; fill: #C7B6F0; letter-spacing: 1px; }
      .gm-text { font: 12px "SF Mono", "Consolas", monospace; fill: #E0DAF5; }
      .gm-mute { font: 11px "SF Mono", "Consolas", monospace; fill: #7A6F95; }
      .gm-emph { font: bold 12px "SF Mono", monospace; fill: #B6E0FF; }
      .gm-tag { font: bold 10px "Trebuchet MS", sans-serif; fill: #FFFFFF; letter-spacing: 0.5px; }
      .gm-step { font: bold 18px "Trebuchet MS", sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1000" height="720" fill="url(#gm-bg)" />
  <rect width="1000" height="720" fill="url(#gm-glow)" />

  <text x="500" y="44" class="gm-title" text-anchor="middle">Gemini CLI · 加载机制 + cc-use-exp 介入链路</text>
  <text x="500" y="66" class="gm-sub" text-anchor="middle">官方文档：geminicli.com/docs · GEMINI.md（hierarchical）+ Skills（v0.24+）+ TOML Commands</text>

  <!-- ① 用户输入 -->
  <rect x="40" y="90" width="920" height="78" rx="10" fill="#1F1745" stroke="#3D2A6E" stroke-width="1.5" filter="url(#gm-shadow)" />
  <circle cx="68" cy="129" r="14" fill="url(#gm-accent)" />
  <text x="68" y="134" class="gm-step" text-anchor="middle">1</text>
  <text x="100" y="118" class="gm-h">USER INPUT · 终端输入</text>
  <rect x="100" y="128" width="820" height="30" rx="5" fill="#0E0822" stroke="#2A1E48" />
  <text x="114" y="148" class="gm-text">$ gemini</text>
  <text x="172" y="148" class="gm-emph">›</text>
  <text x="186" y="148" class="gm-text">/layout 检查 OrderList.vue 的栅格响应式问题</text>

  <!-- ② 加载链路 主区域 -->
  <rect x="40" y="186" width="600" height="430" rx="10" fill="#1F1745" stroke="#3D2A6E" stroke-width="1.5" filter="url(#gm-shadow)" />
  <circle cx="68" cy="216" r="14" fill="url(#gm-accent)" />
  <text x="68" y="221" class="gm-step" text-anchor="middle">2</text>
  <text x="100" y="220" class="gm-h">LOADING PIPELINE · 分层加载</text>

  <!-- 启动加载 GEMINI.md -->
  <rect x="60" y="240" width="560" height="92" rx="6" fill="#241B55" stroke="#5040A0" />
  <rect x="60" y="240" width="80" height="22" rx="4" fill="url(#gm-accent)" />
  <text x="100" y="256" class="gm-tag" text-anchor="middle">启动 · 拼接</text>
  <text x="148" y="256" class="gm-text" font-weight="bold">GEMINI.md hierarchical（concat 注入）</text>
  <text x="74" y="278" class="gm-mute">▸ Global ~/.gemini/GEMINI.md  →  Project .gemini/GEMINI.md  →  ancestors</text>
  <text x="74" y="296" class="gm-mute">▸ JIT 子目录扫描（工具触达目录时按需补充）</text>
  <text x="74" y="314" class="gm-emph">★ @import 注入：rules/file-size-limit · defensive · ops-safety · doc-sync · frontend-style</text>

  <!-- 触发加载 Skills v0.24 -->
  <rect x="60" y="342" width="560" height="92" rx="6" fill="#241B55" stroke="#5040A0" />
  <rect x="60" y="342" width="80" height="22" rx="4" fill="url(#gm-accent)" />
  <text x="100" y="358" class="gm-tag" text-anchor="middle">触发 · 按需</text>
  <text x="148" y="358" class="gm-text" font-weight="bold">Agent Skills（v0.24+，activate_skill 工具调用）</text>
  <text x="74" y="380" class="gm-mute">▸ 描述常驻 → 模型识别匹配 → activate_skill 弹出确认 → 加载完整 SKILL.md</text>
  <text x="74" y="398" class="gm-mute">▸ 优先级：Workspace .gemini/skills/ &gt; User ~/.gemini/skills/ &gt; Extensions</text>
  <text x="74" y="416" class="gm-emph">★ 命中 frontend-dev / api-design-safety / refactor-safety</text>

  <!-- 显式调用 TOML Commands -->
  <rect x="60" y="444" width="560" height="92" rx="6" fill="#241B55" stroke="#5040A0" />
  <rect x="60" y="444" width="80" height="22" rx="4" fill="url(#gm-accent)" />
  <text x="100" y="460" class="gm-tag" text-anchor="middle">显式 · 调用</text>
  <text x="148" y="460" class="gm-text" font-weight="bold">Custom Commands（.toml 文件，/commands reload）</text>
  <text x="74" y="482" class="gm-mute">▸ ~/.gemini/commands/*.toml  +  .gemini/commands/*.toml</text>
  <text x="74" y="500" class="gm-emph">★ /layout → 加载 layout.toml 的 prompt（栅格 + 响应式审计流程）</text>
  <text x="74" y="518" class="gm-mute">▸ Extensions（context7、chrome-devtools-mcp）注入额外工具</text>

  <path d="M 340 538 L 340 580 L 340 590 L 336 584 M 340 590 L 344 584" stroke="#9B72CB" stroke-width="2" fill="none" />
  <text x="350" y="566" class="gm-mute">完整 prompt（拼接的 GEMINI.md + 选中 skills + command prompt + 用户输入）</text>

  <!-- ② 右侧侧栏 -->
  <rect x="660" y="186" width="300" height="430" rx="10" fill="#180E32" stroke="#3D2A6E" stroke-width="1.5" filter="url(#gm-shadow)" />
  <text x="810" y="212" class="gm-h" text-anchor="middle">本项目实际生效</text>
  <text x="810" y="230" class="gm-sub" text-anchor="middle">cc-use-exp 提供的内容</text>

  <line x1="678" y1="244" x2="942" y2="244" stroke="#3D2A6E" />
  <text x="678" y="266" class="gm-emph">GEMINI.md @import（5）</text>
  <text x="678" y="284" class="gm-mute">file-size-limit · defensive</text>
  <text x="678" y="300" class="gm-mute">frontend-style · ops-safety</text>
  <text x="678" y="316" class="gm-mute">doc-sync</text>

  <text x="678" y="346" class="gm-emph">Skills 按需（v0.24+）</text>
  <text x="678" y="364" class="gm-mute">frontend-safety · go-dev · java-dev</text>
  <text x="678" y="380" class="gm-mute">python-dev · ops-safety · bash-style</text>
  <text x="678" y="396" class="gm-mute">api-design-safety · storage-url-safety</text>

  <text x="678" y="426" class="gm-emph">Commands TOML（前端专用）</text>
  <text x="678" y="444" class="gm-mute">/layout · /layout-check · /vue-split</text>
  <text x="678" y="460" class="gm-mute">/patch-http · /fix · /debug</text>
  <text x="678" y="476" class="gm-mute">/code-review · /quick-review · /commit-msg</text>

  <text x="678" y="506" class="gm-emph">Extensions</text>
  <text x="678" y="524" class="gm-mute">context7（库文档查询）</text>
  <text x="678" y="540" class="gm-mute">chrome-devtools-mcp（页面审计）</text>

  <text x="678" y="570" class="gm-emph">Policies</text>
  <text x="678" y="588" class="gm-mute">.gemini/policies/git-rules.toml</text>
  <text x="678" y="604" class="gm-mute">commandPrefix 安全策略</text>

  <!-- ③ 模型调用与结果 -->
  <rect x="40" y="630" width="920" height="74" rx="10" fill="#1F1745" stroke="#3D2A6E" stroke-width="1.5" filter="url(#gm-shadow)" />
  <circle cx="68" cy="667" r="14" fill="url(#gm-accent)" />
  <text x="68" y="672" class="gm-step" text-anchor="middle">3</text>
  <text x="100" y="660" class="gm-h">MODEL CALL · 输出</text>
  <text x="100" y="680" class="gm-text">Gemini 3 Pro</text>
  <text x="220" y="680" class="gm-emph">→</text>
  <text x="238" y="680" class="gm-text">遵循 frontend-style + frontend-safety，输出 Element Plus 栅格修复方案</text>
  <text x="100" y="696" class="gm-mute">CLI 底栏显示 「N context files loaded」+ 「skill: frontend-safety active」</text>
</svg>
