<svg width="1000" height="720" viewBox="0 0 1000 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cx-bg" x1="0" y1="0" x2="1000" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E0E0E" />
      <stop offset="1" stop-color="#050505" />
    </linearGradient>
    <linearGradient id="cx-accent" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10A37F" />
      <stop offset="1" stop-color="#1FD478" />
    </linearGradient>
    <radialGradient id="cx-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 360) rotate(0) scale(420 200)">
      <stop offset="0" stop-color="#10A37F" stop-opacity="0.15" />
      <stop offset="1" stop-color="#10A37F" stop-opacity="0" />
    </radialGradient>
    <filter id="cx-shadow" x="-20" y="-20" width="1040" height="760">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.45" />
    </filter>
    <style>
      .cx-title { font: bold 26px "Trebuchet MS", sans-serif; fill: #1FD478; }
      .cx-sub { font: 13px "Trebuchet MS", sans-serif; fill: #8A9A92; }
      .cx-h { font: bold 14px "Trebuchet MS", sans-serif; fill: #1FD478; letter-spacing: 1px; }
      .cx-text { font: 12px "SF Mono", "Consolas", monospace; fill: #D5E5DD; }
      .cx-mute { font: 11px "SF Mono", "Consolas", monospace; fill: #6F7E76; }
      .cx-emph { font: bold 12px "SF Mono", monospace; fill: #6FFAB4; }
      .cx-tag { font: bold 10px "Trebuchet MS", sans-serif; fill: #050505; letter-spacing: 0.5px; }
      .cx-step { font: bold 18px "Trebuchet MS", sans-serif; fill: #050505; }
    </style>
  </defs>

  <rect width="1000" height="720" fill="url(#cx-bg)" />
  <rect width="1000" height="720" fill="url(#cx-glow)" />

  <text x="500" y="44" class="cx-title" text-anchor="middle">Codex CLI · 加载机制 + cc-use-exp 介入链路</text>
  <text x="500" y="66" class="cx-sub" text-anchor="middle">官方文档：developers.openai.com/codex · AGENTS.md（root → cwd 合并）+ Profiles + Skills 渐进式披露</text>

  <!-- ① 用户输入 -->
  <rect x="40" y="90" width="920" height="78" rx="10" fill="#101412" stroke="#1F2937" stroke-width="1.5" filter="url(#cx-shadow)" />
  <circle cx="68" cy="129" r="14" fill="url(#cx-accent)" />
  <text x="68" y="134" class="cx-step" text-anchor="middle">1</text>
  <text x="100" y="118" class="cx-h">USER INPUT · 终端输入</text>
  <rect x="100" y="128" width="820" height="30" rx="5" fill="#000000" stroke="#1F2937" />
  <text x="114" y="148" class="cx-text">$ codex -p cc-balanced</text>
  <text x="290" y="148" class="cx-emph">›</text>
  <text x="304" y="148" class="cx-text">$fix Redis 缓存击穿问题</text>

  <!-- ② 加载链路 主区域 -->
  <rect x="40" y="186" width="600" height="430" rx="10" fill="#101412" stroke="#1F2937" stroke-width="1.5" filter="url(#cx-shadow)" />
  <circle cx="68" cy="216" r="14" fill="url(#cx-accent)" />
  <text x="68" y="221" class="cx-step" text-anchor="middle">2</text>
  <text x="100" y="220" class="cx-h">LOADING PIPELINE · 受管区块合并</text>

  <!-- 启动加载 -->
  <rect x="60" y="240" width="560" height="92" rx="6" fill="#0F1A15" stroke="#264F3D" />
  <rect x="60" y="240" width="80" height="22" rx="4" fill="url(#cx-accent)" />
  <text x="100" y="256" class="cx-tag" text-anchor="middle">启动 · 合并</text>
  <text x="148" y="256" class="cx-text" font-weight="bold">AGENTS.md 链（global → project root → cwd 合并）</text>
  <text x="74" y="278" class="cx-mute">▸ Global ~/.codex/AGENTS.md（含 cc-use-exp 受管区块）</text>
  <text x="74" y="296" class="cx-mute">▸ Project AGENTS.md（root → cwd 拼接，max 32 KiB）</text>
  <text x="74" y="314" class="cx-emph">★ ~/.codex/rules/*.md（审批与危险命令规则）+ profile cc-balanced.toml 选中</text>

  <!-- 触发加载 -->
  <rect x="60" y="342" width="560" height="92" rx="6" fill="#0F1A15" stroke="#264F3D" />
  <rect x="60" y="342" width="80" height="22" rx="4" fill="url(#cx-accent)" />
  <text x="100" y="358" class="cx-tag" text-anchor="middle">触发 · 按需</text>
  <text x="148" y="358" class="cx-text" font-weight="bold">Skills 渐进式披露（≤2% context 列表）</text>
  <text x="74" y="380" class="cx-mute">▸ ~/.agents/skills/ 中 SKILL.md 仅注入 name/description/path</text>
  <text x="74" y="398" class="cx-mute">▸ 模型选中 → 加载完整 SKILL.md + agents/openai.yaml 元数据</text>
  <text x="74" y="416" class="cx-emph">★ 命中 cc-redis-safety / cc-core-defensive / cc-fix workflow</text>

  <!-- 显式调用 -->
  <rect x="60" y="444" width="560" height="92" rx="6" fill="#0F1A15" stroke="#264F3D" />
  <rect x="60" y="444" width="80" height="22" rx="4" fill="url(#cx-accent)" />
  <text x="100" y="460" class="cx-tag" text-anchor="middle">显式 · 调用</text>
  <text x="148" y="460" class="cx-text" font-weight="bold">Workflow Skills（$ 前缀触发）</text>
  <text x="74" y="482" class="cx-mute">▸ Codex 无独立 commands 目录，统一通过 skills 实现 workflow</text>
  <text x="74" y="500" class="cx-emph">★ $fix → 加载 cc-fix/SKILL.md（复现 → 假设 → 验证 → 最小修复）</text>
  <text x="74" y="518" class="cx-mute">▸ 子任务持久化到 .codex/tasks/，支持中断恢复</text>

  <path d="M 340 538 L 340 580 L 340 590 L 336 584 M 340 590 L 344 584" stroke="#10A37F" stroke-width="2" fill="none" />
  <text x="350" y="566" class="cx-mute">完整 prompt（合并 AGENTS.md + 选中 skills + workflow + 用户输入）</text>

  <!-- ② 右侧侧栏 -->
  <rect x="660" y="186" width="300" height="430" rx="10" fill="#0A0A0A" stroke="#1F2937" stroke-width="1.5" filter="url(#cx-shadow)" />
  <text x="810" y="212" class="cx-h" text-anchor="middle">本项目实际生效</text>
  <text x="810" y="230" class="cx-sub" text-anchor="middle">cc-use-exp 增量部署</text>

  <line x1="678" y1="244" x2="942" y2="244" stroke="#1F2937" />
  <text x="678" y="266" class="cx-emph">AGENTS.md 受管区块</text>
  <text x="678" y="284" class="cx-mute">工作方式 · 质量要求</text>
  <text x="678" y="300" class="cx-mute">安全 · 交互 · 分层</text>
  <text x="678" y="316" class="cx-mute">~/.codex/AGENTS.md 内合并</text>

  <text x="678" y="346" class="cx-emph">Profiles（4 个）</text>
  <text x="678" y="364" class="cx-mute">cc-fast-api · cc-balanced</text>
  <text x="678" y="380" class="cx-mute">cc-deep · cc-custom-instructions</text>
  <text x="678" y="396" class="cx-mute">写入 ~/.codex/config.toml 受管区块</text>

  <text x="678" y="426" class="cx-emph">Skills（27 个，~/.agents/skills/）</text>
  <text x="678" y="444" class="cx-mute">cc-fix · cc-review · cc-design</text>
  <text x="678" y="460" class="cx-mute">cc-new-feature · cc-optimize</text>
  <text x="678" y="476" class="cx-mute">cc-go-dev · cc-java-dev · cc-python-dev</text>

  <text x="678" y="506" class="cx-emph">Instructions（~/.codex/instructions/）</text>
  <text x="678" y="524" class="cx-mute">custom.md（cc-custom-instructions）</text>

  <text x="678" y="554" class="cx-emph">部署特性</text>
  <text x="678" y="572" class="cx-mute">增量管理，不动 auth/history</text>
  <text x="678" y="588" class="cx-mute">不改用户默认 model/provider</text>
  <text x="678" y="604" class="cx-mute">受管区块由 sync-config.sh 维护</text>

  <!-- ③ 模型调用与结果 -->
  <rect x="40" y="630" width="920" height="74" rx="10" fill="#101412" stroke="#1F2937" stroke-width="1.5" filter="url(#cx-shadow)" />
  <circle cx="68" cy="667" r="14" fill="url(#cx-accent)" />
  <text x="68" y="672" class="cx-step" text-anchor="middle">3</text>
  <text x="100" y="660" class="cx-h">MODEL CALL · 输出</text>
  <text x="100" y="680" class="cx-text">GPT-5.3-Codex（profile: cc-balanced, reasoning_effort: medium）</text>
  <text x="538" y="680" class="cx-emph">→</text>
  <text x="556" y="680" class="cx-text">遵循 redis-safety + fix workflow，输出双删 + 互斥锁修复方案</text>
  <text x="100" y="696" class="cx-mute">破坏性命令受 ~/.codex/rules/ 拦截，需用户审批后落盘</text>
</svg>
