name: CLA Gate

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - edited

permissions:
  contents: read
  pull-requests: read

jobs:
  cla-gate:
    name: Require CLA Before Merge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4

      - name: Run CLA gate
        run: ./tools/check-cla-gate.sh
